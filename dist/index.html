<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ZOVEN – Sistemi digitali su misura che trasformano visitatori in clienti. Siti, ecommerce, booking e funnel WhatsApp." />
    <meta name="theme-color" content="#06080f" />
    <title>ZOVEN – Sistemi che convertono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ─────────────────────────────────────────────
         ZOVEN — Premium Preloader
      ───────────────────────────────────────────── */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

      #zv-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #06080f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.6s cubic-bezier(0.4,0,0.2,1);
      }
      #zv-loader.zv-out {
        opacity: 0;
        transform: scale(1.025);
        pointer-events: none;
      }

      /* Grid backdrop */
      #zv-loader::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: zl-grid 0.9s ease forwards;
        opacity: 0;
      }
      @keyframes zl-grid { to { opacity: 1; } }

      /* Scan line */
      .zl-scan {
        position: absolute;
        left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.7) 30%, rgba(124,58,237,0.7) 70%, transparent 100%);
        box-shadow: 0 0 16px rgba(0,212,255,0.5), 0 0 40px rgba(0,212,255,0.2);
        top: 0;
        animation: zl-scan 1.1s cubic-bezier(0.4,0,0.6,1) 0.25s both;
      }
      @keyframes zl-scan {
        0%   { top: 0%;   opacity: 1; }
        85%  { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }

      /* Ambient glows */
      .zl-glow-l {
        position: absolute;
        top: -150px; left: -150px;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(124,58,237,0.14) 0%, transparent 65%);
        pointer-events: none;
        animation: zl-fade 1s ease 0.1s both;
      }
      .zl-glow-r {
        position: absolute;
        bottom: -150px; right: -150px;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(0,212,255,0.11) 0%, transparent 65%);
        pointer-events: none;
        animation: zl-fade 1s ease 0.2s both;
      }
      @keyframes zl-fade { from { opacity: 0; } to { opacity: 1; } }

      /* Center content */
      .zl-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        position: relative;
        z-index: 2;
      }

      /* Lettermark */
      .zl-mark {
        position: relative;
        width: 76px; height: 76px;
        border-radius: 50%;
        background: rgba(0,212,255,0.03);
        border: 1px solid rgba(0,212,255,0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 48px rgba(0,212,255,0.08), inset 0 0 24px rgba(0,212,255,0.04);
        animation: zl-mark 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
      }
      .zl-mark::before {
        content: '';
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 1px solid rgba(0,212,255,0.07);
        animation: zl-spin 10s linear infinite;
      }
      .zl-mark::after {
        content: '';
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        border: 1px dashed rgba(124,58,237,0.05);
        animation: zl-spin-r 16s linear infinite;
      }
      @keyframes zl-mark {
        from { opacity: 0; transform: scale(0.35) rotate(-20deg); }
        to   { opacity: 1; transform: scale(1)    rotate(0deg); }
      }
      @keyframes zl-spin   { to { transform: rotate(360deg);  } }
      @keyframes zl-spin-r { to { transform: rotate(-360deg); } }

      .zl-z {
        font-family: 'Syne', 'Inter', sans-serif;
        font-size: 30px;
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Wordmark */
      .zl-word {
        display: flex;
        font-family: 'Syne', 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.38em;
        color: #fff;
        text-transform: uppercase;
        overflow: hidden;
      }
      .zl-word span {
        display: inline-block;
        opacity: 0;
        animation: zl-letter 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .zl-word span:nth-child(1) { animation-delay: 0.52s; }
      .zl-word span:nth-child(2) { animation-delay: 0.62s; }
      .zl-word span:nth-child(3) { animation-delay: 0.72s; }
      .zl-word span:nth-child(4) { animation-delay: 0.82s; }
      .zl-word span:nth-child(5) { animation-delay: 0.92s; }
      @keyframes zl-letter {
        from { opacity: 0; transform: translateY(14px) rotateX(40deg); }
        to   { opacity: 1; transform: translateY(0)    rotateX(0deg);  }
      }

      /* Tagline */
      .zl-tag {
        font-family: 'Inter', sans-serif;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(136,146,164,0.65);
        animation: zl-fade 0.7s ease 1.05s both;
      }

      /* Divider dots */
      .zl-dots {
        display: flex;
        gap: 6px;
        animation: zl-fade 0.5s ease 1.15s both;
      }
      .zl-dots span {
        width: 3px; height: 3px;
        border-radius: 50%;
        background: rgba(0,212,255,0.3);
        animation: zl-dot-pulse 1.8s ease-in-out infinite;
      }
      .zl-dots span:nth-child(1) { animation-delay: 0s;    background: rgba(0,212,255,0.5); }
      .zl-dots span:nth-child(2) { animation-delay: 0.25s; }
      .zl-dots span:nth-child(3) { animation-delay: 0.5s;  }
      @keyframes zl-dot-pulse {
        0%,100% { opacity: 0.25; transform: scale(1);   }
        50%      { opacity: 1;   transform: scale(1.4); }
      }

      /* Progress bar */
      .zl-bar {
        position: absolute;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 1px;
        background: rgba(255,255,255,0.05);
        border-radius: 2px;
        overflow: visible;
      }
      .zl-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        background: linear-gradient(90deg, #00d4ff, #7c3aed);
        box-shadow: 0 0 8px rgba(0,212,255,0.7);
        animation: zl-progress 1.5s ease 0.15s both;
        position: relative;
      }
      .zl-bar-fill::after {
        content: '';
        position: absolute;
        right: 0; top: 50%;
        transform: translate(50%,-50%);
        width: 4px; height: 4px;
        border-radius: 50%;
        background: #00d4ff;
        box-shadow: 0 0 8px #00d4ff, 0 0 16px rgba(0,212,255,0.6);
      }
      @keyframes zl-progress {
        0%   { width: 0%;   }
        25%  { width: 30%;  }
        60%  { width: 68%;  }
        85%  { width: 88%;  }
        100% { width: 100%; }
      }

      /* React root — enter after loader */
      #root {
        animation: zl-root-in 0.55s cubic-bezier(0.16,1,0.3,1) 1.7s both;
      }
      @keyframes zl-root-in {
        from { opacity: 0; transform: translateY(6px) scale(0.992); filter: blur(3px); }
        to   { opacity: 1; transform: translateY(0)   scale(1);     filter: blur(0);  }
      }

      /* ─────────────────────────────────────────────
         CUSTOM CURSOR  (desktop only)
      ───────────────────────────────────────────── */
      @media (pointer: fine) {
        * { cursor: none !important; }
      }
      #zv-dot {
        position: fixed;
        width: 6px; height: 6px;
        background: #00d4ff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        transform: translate(-50%,-50%);
        box-shadow: 0 0 10px rgba(0,212,255,0.9), 0 0 4px rgba(0,212,255,0.5);
        transition: width 0.12s, height 0.12s, background 0.15s, box-shadow 0.15s, transform 0.08s;
        will-change: left, top;
      }
      #zv-ring {
        position: fixed;
        width: 34px; height: 34px;
        border: 1.5px solid rgba(0,212,255,0.3);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99997;
        transform: translate(-50%,-50%);
        transition:
          left    0.1s ease-out,
          top     0.1s ease-out,
          width   0.3s cubic-bezier(0.34,1.56,0.64,1),
          height  0.3s cubic-bezier(0.34,1.56,0.64,1),
          border-color 0.25s,
          opacity 0.25s;
        will-change: left, top;
      }
      #zv-dot.zv-hover  { width: 10px; height: 10px; background: #7c3aed; box-shadow: 0 0 14px rgba(124,58,237,0.9); }
      #zv-ring.zv-hover { width: 52px; height: 52px; border-color: rgba(124,58,237,0.45); }
      #zv-dot.zv-press  { transform: translate(-50%,-50%) scale(0.7); }
      #zv-ring.zv-press { width: 28px; height: 28px; border-color: rgba(0,212,255,0.7); }
      @media (hover: none) { #zv-dot, #zv-ring { display: none; } }
    </style>
    <script type="module" crossorigin src="/assets/index-DKHLTX8v.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Cu8f-11C.css">
  </head>
  <body>
    <!-- Cursor -->
    <div id="zv-dot"  aria-hidden="true"></div>
    <div id="zv-ring" aria-hidden="true"></div>

    <!-- Preloader -->
    <div id="zv-loader" aria-hidden="true">
      <div class="zl-glow-l"></div>
      <div class="zl-glow-r"></div>
      <div class="zl-scan"></div>
      <div class="zl-center">
        <div class="zl-mark"><span class="zl-z">Z</span></div>
        <div class="zl-word"><span>Z</span><span>O</span><span>V</span><span>E</span><span>N</span></div>
        <div class="zl-tag">Sistemi che convertono</div>
        <div class="zl-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="zl-bar"><div class="zl-bar-fill"></div></div>
    </div>

    <div id="root"></div>

    <!-- Cursor logic — runs immediately, pure perf-optimised RAF -->
    <script>
      (function () {
        var dot  = document.getElementById('zv-dot');
        var ring = document.getElementById('zv-ring');
        if (!dot || !ring) return;
        var tx = -100, ty = -100, rx = -100, ry = -100;
        var raf;
        function loop() {
          dot.style.left  = tx + 'px';
          dot.style.top   = ty + 'px';
          ring.style.left = rx + 'px';
          ring.style.top  = ry + 'px';
          raf = requestAnimationFrame(loop);
        }
        raf = requestAnimationFrame(loop);
        document.addEventListener('mousemove', function (e) {
          tx = e.clientX; ty = e.clientY;
          rx = e.clientX; ry = e.clientY;
        }, { passive: true });
        document.addEventListener('mousedown', function () {
          dot.classList.remove('zv-hover'); ring.classList.remove('zv-hover');
          dot.classList.add('zv-press');    ring.classList.add('zv-press');
        });
        document.addEventListener('mouseup', function () {
          dot.classList.remove('zv-press'); ring.classList.remove('zv-press');
        });
        document.addEventListener('mouseover', function (e) {
          var el = e.target;
          var isClickable = el && (
            el.tagName === 'A' || el.tagName === 'BUTTON' ||
            el.tagName === 'INPUT' || el.tagName === 'SELECT' ||
            el.tagName === 'TEXTAREA' ||
            (el.getAttribute && (el.getAttribute('role') === 'button' || el.getAttribute('tabindex') !== null))
          );
          if (isClickable) {
            dot.classList.add('zv-hover');  ring.classList.add('zv-hover');
          } else {
            dot.classList.remove('zv-hover'); ring.classList.remove('zv-hover');
          }
        }, { passive: true });
      })();
    </script>

    <!-- Preloader exit -->
    <script>
      (function () {
        function dismiss() {
          var loader = document.getElementById('zv-loader');
          if (!loader) return;
          setTimeout(function () {
            loader.classList.add('zv-out');
            setTimeout(function () { loader.remove(); }, 650);
          }, 1650);
        }
        if (document.readyState === 'complete') { dismiss(); }
        else { window.addEventListener('load', dismiss, { once: true }); }
      })();
    </script>
  </body>
